kind = "web"
previewPath = "/"
title = "Billable · by Sylens"
version = "1.0.0"
id = "artifacts/billables"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22838

[services.development]
run = "pnpm --filter @workspace/billables run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/billables", "run", "build" ]
publicDir = "artifacts/billables/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22838"
BASE_PATH = "/"
